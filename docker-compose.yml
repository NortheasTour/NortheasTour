services:
  postgres:
    image: postgres:15-alpine
    container_name: northeastour-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-northeasTour}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    container_name: northeastour-backend
    restart: unless-stopped
    working_dir: /app/apps/backend
    command: sh -c "npm run prisma:generate && npm run prisma:db-push && npm run start:dev:docker"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-northeasTour}?schema=public
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-5173},http://127.0.0.1:${FRONTEND_PORT:-5173}
      CHOKIDAR_USEPOLLING: "true"
      PRISMA_HIDE_UPDATE_MESSAGE: "true"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_started
    stdin_open: true
    tty: true

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    container_name: northeastour-frontend
    restart: unless-stopped
    working_dir: /app/apps/frontend
    command: npm run dev:docker
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules: